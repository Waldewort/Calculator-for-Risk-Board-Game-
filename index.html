<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Calculator</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
            background-color: #f4f4f9; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            padding: 20px; 
            background: white; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: bold; 
        }
        input { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            margin-top: 20px; 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #ergebnis { 
            margin-top: 20px; 
            font-weight: bold; 
            white-space: pre-line; 
            color: #333; 
            border-top: 2px solid #eee; 
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Risk Calculator</h2>

    <label for="angreifer">Attackers:</label>
    <input type="number" id="angreifer" value="10">

    <label for="verteidiger">Defenders:</label>
    <input type="number" id="verteidiger" value="10">

    <label for="uebrig">Number of attackers that should remain:</label>
    <input type="number" id="uebrig" value="0">

    <button onclick="starteSimulation()">Start Battle</button>

    <div id="ergebnis">Waiting for input...</div>
</div>

<script>
// Entspricht der def würfeln() aus Python
function wuerfeln() {
    return Math.floor(Math.random() * 6) + 1;
}

// Entspricht der def normalwürfeln() aus Python
function normalwuerfeln() {
    let x = [wuerfeln(), wuerfeln(), wuerfeln()];
    x.sort((a, b) => a - b); // Numerische Sortierung im JS
    let y = [wuerfeln(), wuerfeln()];
    y.sort((a, b) => a - b);
    return { x, y };
}

function starteSimulation() {
    // Werte aus den Eingabefeldern auslesen
    let a = parseInt(document.getElementById("angreifer").value);
    let v = parseInt(document.getElementById("verteidiger").value);
    let ue = parseInt(document.getElementById("uebrig").value);
    
    // Zeitmessung starten
    let t1 = performance.now();
    let i = 1;

    // --- IHRE LOGIK AUS MAIN.PY IN JAVASCRIPT ---
    while (a > ue && v > 0) {
        if (a >= 3 && v >= 2) {
            let res = normalwuerfeln();
            let x = res.x;
            let y = res.y;
            
            if (x[1] > y[0]) {
                v -= 1;
            } else {
                a -= 1;
            }

            if (x[2] > y[1]) {
                v -= 1;
            } else {
                a -= 1;
            }
            i += 1;
        }
        
        if (v < 2 && v > 0) {
            let x = [];
            let z = 0;
            if (a >= 3) {
                x = [wuerfeln(), wuerfeln(), wuerfeln()];
                x.sort((num1, num2) => num1 - num2);
                z = 3;
            } else if (a === 2) {
                x = [wuerfeln(), wuerfeln()];
                x.sort((num1, num2) => num1 - num2);
                z = 2;
            } else if (a === 1) {
                x = [wuerfeln()];
                z = 1;
            }
            let y = [wuerfeln()];

            if (x[z - 1] > y[0]) {
                v -= 1;
            } else {
                a -= 1;
            }
        }

        if (a < 3 && a > 0) {
            if (a > ue && v > 0) {
                let y = [];
                let z = 0;
                if (v >= 2) {
                    y = [wuerfeln(), wuerfeln()];
                    y.sort((num1, num2) => num1 - num2);
                    z = 2;
                } else if (v === 1) {
                    y = [wuerfeln()];
                    z = 1;
                }

                let x = [];
                let z1 = 0;
                if (a === 2) {
                    x = [wuerfeln(), wuerfeln()];
                    x.sort((num1, num2) => num1 - num2);
                    z1 = 2;
                } else if (a === 1) {
                    x = [wuerfeln()];
                    x.sort((num1, num2) => num1 - num2);
                    z1 = 1;
                }

                if (x[z1 - 1] > y[z - 1]) {
                    v -= 1;
                } else {
                    a -= 1;
                }
            }
        }
    }
    // --- ENDE DER LOGIK ---

    // Zeit berechnen (In Sekunden umrechnen)
    let t2 = performance.now();
    let rechenzeit = (t2 - t1) / 1000;

    // Ergebnis auf der Webseite ausgeben
    let ausgabe = `There are ${a} attackers left.\nThere are ${v} defenders left.\nCalculation time: ${rechenzeit.toFixed(6)} seconds.`;
    document.getElementById("ergebnis").innerText = ausgabe;
}
</script>

</body>
</html>
