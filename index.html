<!DOCTYPE html>
<html lang="de" style="background-color: #121214 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISK Battle-Simulator</title>
    
    <style>
        /* Extrem robustes Basis-Design - Verhindert jegliche weiße Flächen */
        html, body {
            background-color: #121214 !important;
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .main-container {
            background: #1a1a1e;
            width: 100%;
            max-width: 650px; /* Leicht erhöht für mehr Atatmenraum der 3 Spalten */
            margin: 20px;
            padding: 35px;
            border-radius: 16px;
            border: 1px solid #2d2d35;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: #f1c40f;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #8a8a93;
            margin-top: -10px;
            margin-bottom: 30px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Bombensicheres Grid-Layout - Hält alle 3 Felder strikt im Kasten */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 0; /* Verhindert das Herausragen von Inhalten */
        }

        .input-group label {
            font-size: 11px;
            color: #a1a1aa;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .input-group input {
            background: #25252b;
            border: 2px solid #3f3f46;
            border-radius: 10px;
            padding: 14px 5px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s ease;
            width: 100%;
        }

        .input-group input:focus {
            border-color: #f1c40f;
            background: #2d2d35;
            outline: none;
        }

        /* Großer Action-Button */
        .btn-action {
            background: linear-gradient(135deg, #e53935, #b71c1c);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(183, 28, 28, 0.4);
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(183, 28, 28, 0.6);
            background: linear-gradient(135deg, #ef5350, #c62828);
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        /* Live-Truppen-Anzeige */
        .live-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            background: #111113;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #27272a;
        }

        .side-panel {
            text-align: center;
            width: 42%;
        }

        .side-panel .icon { font-size: 40px; margin-bottom: 5px; }
        .side-panel .label { font-size: 11px; text-transform: uppercase; color: #71717a; font-weight: bold; }
        .side-panel .count { font-size: 32px; font-weight: bold; margin-top: 5px; }
        
        .side-panel.attacker { color: #f87171; }
        .side-panel.defender { color: #60a5fa; }
        .vs-divider { font-size: 18px; color: #f1c40f; font-weight: bold; font-style: italic; }

        /* Interaktives Kampf-Overlay */
        .battle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 12, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
            max-width: 450px;
            width: 90%;
        }

        .clash-icon {
            font-size: 75px;
            margin-bottom: 25px;
            display: inline-block;
            animation: pulseClash 0.5s infinite alternate ease-in-out;
        }

        .overlay-title {
            font-size: 24px;
            color: #f1c40f;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
        }

        .overlay-text {
            color: #d4d4d8;
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Ladebalken */
        .bar-container {
            width: 100%;
            background: #27272a;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef5350, #f1c40f);
            width: 0%;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ausgabefeld für Ergebnisse */
        .result-box {
            margin-top: 30px;
            padding: 22px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-size: 15px;
            line-height: 1.6;
        }

        .result-box.win-attacker { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; color: #4ade80; }
        .result-box.win-defender { background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; color: #60a5fa; }
        .res-headline { font-size: 18px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .res-meta { font-size: 11px; color: #a1a1aa; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }

        @keyframes pulseClash {
            0% { transform: scale(1) rotate(-4deg); }
            100% { transform: scale(1.15) rotate(4deg); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>RISK Calculator</h1>
    <div class="subtitle">Military Probability Calculation</div>

    <div class="input-grid">
        <div class="input-group">
            <label for="angreifer">⚔️ Attackers</label>
            <input type="number" id="angreifer" value="24" min="1" oninput="liveUpdate()">
        </div>
        <div class="input-group">
            <label for="uebrig">Attackers Remaining</label>
            <input type="number" id="uebrig" value="1" min="0">
        </div>
        <div class="input-group">
            <label for="verteidiger">🛡️ Defenders</label>
            <input type="number" id="verteidiger" value="27" min="1" oninput="liveUpdate()">
        </div>
    </div>

    <button class="btn-action" onclick="executeBattleAnimation()">Start Battle</button>

    <div class="live-dashboard">
        <div class="side-panel attacker">
            <div class="icon">⚔️</div>
            <div class="label">Attackers</div>
            <div class="count" id="dashAtt">24</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="side-panel defender">
            <div class="icon">🛡️</div>
            <div class="label">Defenders</div>
            <div class="count" id="dashDef">27</div>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="res-headline" id="resHeadline"></div>
        <div id="resBody"></div>
        <div class="res-meta" id="resMeta"></div>
    </div>
</div>

<div class="battle-overlay" id="battleOverlay">
    <div class="overlay-content">
        <div class="clash-icon">⚔️💥🛡️</div>
        <div class="overlay-title">Battle is in Progress</div>
        <div class="overlay-text">Troups are advancing. Dice are being rolled...</div>
        <div class="bar-container">
            <div class="bar-fill" id="barFill"></div>
        </div>
    </div>
</div>

<script>
function liveUpdate() {
    document.getElementById("dashAtt").innerText = document.getElementById("angreifer").value || 0;
    document.getElementById("dashDef").innerText = document.getElementById("verteidiger").value || 0;
    document.getElementById("resultBox").style.display = "none";
}

// Mathe-Logik aus Main.py
function wuerfel() {
    return Math.floor(Math.random() * 6) + 1;
}

function normalwuerfeln() {
    var x = [wuerfel(), wuerfel(), wuerfel()];
    x.sort(function(a, b) { return a - b; });
    var y = [wuerfel(), wuerfel()];
    y.sort(function(a, b) { return a - b; });
    return { x: x, y: y };
}

function berechneSchlachtLogik() {
    var a = parseInt(document.getElementById("angreifer").value, 10) || 0;
    var v = parseInt(document.getElementById("verteidiger").value, 10) || 0;
    var ue = parseInt(document.getElementById("uebrig").value, 10) || 0;
    
    var a1 = a;
    var v1 = v;
    var t1 = performance.now();

    var x = [];
    var y = [];
    var z = 0;
    var z1 = 0;

    if (a <= ue || v <= 0) {
        return { error: true, msg: "Calculation not possible: Number of attackers must be greater than the desired minimum and defenders must be present." };
    }

    var maxSchleifen = 1000000;
    var zaehler = 0;

    while (a > ue && v > 0) {
        zaehler++;
        if (zaehler > maxSchleifen) { break; }

        if (a >= 3 && v >= 2) {
            var res = normalwuerfeln();
            x = res.x;
            y = res.y;
            if (x[1] > y[0]) { v -= 1; } else { a -= 1; }
            if (x[2] > y[1]) { v -= 1; } else { a -= 1; }
        }
        
        if (v < 2 && v > 0) {
            if (a >= 3) { x = [wuerfel(), wuerfel(), wuerfel()]; x.sort(function(m, n) { return m - n; }); z = 3; }
            if (a == 2) { x = [wuerfel(), wuerfel()]; x.sort(function(m, n) { return m - n; }); z = 2; }
            if (a == 1) { x = [wuerfel()]; z = 1; }
            y = [wuerfel()];

            if (x[z-1] > y[0]) { v -= 1; } else { a -= 1; }
        }
       
        if (a < 3 && a > 0) {
            var checkY = false;
            var checkX = false;

            if (v >= 2) { y = [wuerfel(), wuerfel()]; y.sort(function(m, n) { return m - n; }); z = 2; checkY = true; }
            if (v == 1) { y = [wuerfel()]; z = 1; checkY = true; }
            if (a == 2) { x = [wuerfel(), wuerfel()]; x.sort(function(m, n) { return m - n; }); z1 = 2; checkX = true; }
            if (a == 1) { x = [wuerfel()]; x.sort(function(m, n) { return m - n; }); z1 = 1; checkX = true; }

            if (checkX && checkY) {
                if (x[z1-1] > y[z-1]) { v -= 1; } else { a -= 1; }
            } else {
                if (a > 0 && v > 0) {
                    if (wuerfel() > wuerfel()) { v -= 1; } else { a -= 1; }
                }
            }
        }
    }

    var t2 = performance.now();
    var zeit = (t2 - t1) / 1000;
    var verhaeltnis = (v1 - v) > 0 ? (a1 - a) / (v1 - v) : 0;

    return {
        error: false,
        endA: a,
        endV: v,
        zeit: zeit,
        verhaeltnis: verhaeltnis
    };
}

function executeBattleAnimation() {
    var overlay = document.getElementById("battleOverlay");
    var fill = document.getElementById("barFill");
    var resultBox = document.getElementById("resultBox");

    var testErgebnis = berechneSchlachtLogik();
    if (testErgebnis.error) {
        alert(testErgebnis.msg);
        return;
    }

    resultBox.style.display = "none";
    fill.style.width = "0%";
    overlay.style.display = "flex";

    setTimeout(function() {
        fill.style.width = "100%";
    }, 50);

    setTimeout(function() {
        overlay.style.display = "none";
        var ergebnis = berechneSchlachtLogik();

        document.getElementById("dashAtt").innerText = ergebnis.endA;
        document.getElementById("dashDef").innerText = ergebnis.endV;

        resultBox.className = "result-box"; 
        if (ergebnis.endV === 0) {
            resultBox.classList.add("win-attacker");
            document.getElementById("resHeadline").innerText = "🏆 The Attacker Wins!";
            document.getElementById("resBody").innerHTML = "The enemy lines have been shattered.<br>There are <b>" + ergebnis.endA + "</b> attackers remaining on the field.";
        } else {
            resultBox.classList.add("win-defender");
            document.getElementById("resHeadline").innerText = "🛡️ The Defense Triumphs!";
            document.getElementById("resBody").innerHTML = "The assault was successfully repelled.<br>There are <b>" + ergebnis.endV + "</b> defenders remaining in the fortress.";
        }

        document.getElementById("resMeta").innerText = "Calculation Time: " + ergebnis.zeit.toFixed(5) + " Sec. | Loss Ratio: " + (isNaN(ergebnis.verhaeltnis) ? "0" : ergebnis.verhaeltnis.toFixed(2));
        resultBox.style.display = "block";

    }, 1300); 
}
</script>

</body>
</html>
